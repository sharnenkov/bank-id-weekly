<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bank ID · Еженедельный дашборд</title>
<meta property="og:type" content="website">
<meta property="og:title" content="Bank ID · Еженедельный дашборд">
<meta property="og:description" content="Еженедельный дашборд проекта: бюджет, вехи и стримы">
<meta property="og:url" content="https://bank-id-weekly.vercel.app">
<meta property="og:site_name" content="Bank ID · Еженедельный дашборд">
<meta property="og:image" content="https://raw.githubusercontent.com/sharnenkov/bank-id-weekly/main/og.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="1200">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://raw.githubusercontent.com/sharnenkov/bank-id-weekly/main/og.png">
<meta name="twitter:title" content="Bank ID · Еженедельный дашборд">
<meta name="twitter:description" content="Еженедельный дашборд проекта: бюджет, вехи и стримы">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --canvas: #07070a;
  --surf: rgba(255,255,255,0.033);
  --border: rgba(255,255,255,0.07);
  --text: #f0ede8;
  --muted: rgba(240,237,232,0.38);
  --dim: rgba(240,237,232,0.18);
  --blue:   #2db8f5;
  --green:  #0ae448;
  --gold:   #f5c842;
  --brown:  #c47d3e;
  --violet: #a78bfa;
  --coral:  #ff7a59;
}
html { overflow-x: clip; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--canvas);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}
#amb {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  transition: background 1.5s cubic-bezier(0.4,0,0.2,1);
}
#topfade {
  position: fixed; top: 0; left: 0; right: 0; z-index: 15; pointer-events: none;
  height: 140px;
  background: linear-gradient(to bottom, #07070a 40%, transparent 100%);
}
.page { position: relative; max-width: 480px; margin: 0 auto; padding: 0 16px 120px; opacity: 0; transition: opacity .4s ease; }

/* ── Header ── */
.stickyH {
  position: sticky; top: 0; z-index: 20;
  padding: 8px 16px 0; margin: 0 -16px;
}
.stickyH-inner {
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  background: rgba(18,18,24,0.72);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 18px;
  padding: 13px 16px 13px;
  box-shadow: 0 2px 24px rgba(0,0,0,0.35), 0 8px 32px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.07);
}
.hRow { display:flex; justify-content:space-between; align-items:center; }
.brand { display:flex; align-items:center; gap:10px; }
.brand-icon {
  width:30px; height:30px; border-radius:9px;
  display:flex; align-items:center; justify-content:center; font-size:15px;
  transition: background 1s, box-shadow 1s;
}
.brand-name { font-size:15px; font-weight:700; letter-spacing:-0.03em; color:#fff; }
.brand-sub  { font-size:10px; color:var(--muted); letter-spacing:0.02em; margin-top:1px; }
.wtag {
  font-size:10px; padding:3px 11px; border-radius:100px;
  border:1px solid var(--border); color:var(--muted);
  transition: border-color 1s, color 1s; letter-spacing:0.03em; white-space:nowrap;
}
.navRow { display:flex; gap:6px; margin-top:11px; overflow-x:auto; scrollbar-width:none; }
.navRow::-webkit-scrollbar { display:none; }
.npill {
  display:flex; align-items:center; gap:5px;
  padding:5px 11px 5px 8px; border-radius:100px;
  border:1px solid var(--border); background:transparent;
  cursor:pointer; white-space:nowrap; user-select:none;
  transition: border-color .5s, background .5s;
}
.npill.on { border-color:transparent; }
.npill-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.npill-lbl { font-size:10px; font-weight:600; letter-spacing:0.03em; color:var(--muted); transition:color .5s; }
.npill.on .npill-lbl { color:rgba(0,0,0,0.78); }

/* ── Sections ── */
.sec { padding-top:32px; }
.sec+.sec { margin-top:8px; padding-top:36px; border-top:1px solid rgba(255,255,255,0.05); }
.eyebrow {
  display:flex; align-items:center; gap:7px;
  font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.1em;
  color:var(--muted); margin-bottom:8px; transition:color .8s;
}
.eye-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; transition:background .8s, box-shadow .8s, opacity .8s; }
.sec-title {
  font-size:28px; font-weight:800; letter-spacing:-0.04em; line-height:1.08;
  color:#fff; margin-bottom:20px;
}
.sec-title em { font-style:normal; transition:color .8s; }

/* ── 2-col stat strip ── */
.stat2 { display:grid; grid-template-columns:1fr 1.35fr; gap:8px; margin-bottom:20px; }
.stat2-card {
  background:var(--surf); border:1px solid var(--border); border-radius:16px;
  padding:16px 14px; transition:border-color 1s, box-shadow 1s;
}
.stat2-n { font-size:36px; font-weight:800; color:#fff; line-height:1; }
.stat2-l { font-size:12px; color:var(--muted); margin-top:6px; line-height:1.3; }

/* ── Innovation-style card (used for streams / milestones detail) ── */
.icard {
  background:var(--surf); border:1px solid var(--border); border-radius:16px;
  padding:16px; margin-bottom:10px; transition:border-color .7s, box-shadow .7s;
}
.icard:last-child { margin-bottom:0; }
.icard-name { font-size:17px; font-weight:700; color:#fff; line-height:1.2; margin-bottom:6px; }
.icard-desc { font-size:13px; color:var(--muted); line-height:1.5; margin-bottom:14px; }
.icard-divider { height:1px; background:rgba(255,255,255,0.06); margin-bottom:12px; }
.icard-row { display:flex; flex-direction:column; gap:10px; }
.icard-field {}
.icard-label {
  font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.08em;
  color:var(--dim); margin-bottom:3px;
}
.icard-val { font-size:13px; color:rgba(255,255,255,0.75); line-height:1.4; }
.icard-artifact {
  margin-top:12px; padding:10px 12px;
  background:rgba(255,255,255,0.04); border-radius:10px;
  border:1px solid rgba(255,255,255,0.07);
}
.icard-artifact .icard-label { color:var(--muted); }
.icard-artifact .icard-val { font-size:12px; color:rgba(255,255,255,0.6); }

/* ── Milestone progress card ── */
.mcard {
  background:var(--surf); border:1px solid var(--border); border-radius:16px;
  padding:16px 17px; margin-bottom:12px; transition:border-color 1s;
}
.mcard:last-child { margin-bottom:0; }
.mcard-ttl { font-size:15px; font-weight:700; color:#fff; margin-bottom:12px; }
.mtrack { height:18px; background:rgba(255,255,255,0.04); border-radius:5px; overflow:hidden; margin-bottom:8px; }
.mbar { height:100%; border-radius:5px; }
.mval { font-size:12px; color:var(--muted); }
.mval b { color:rgba(255,255,255,0.85); font-weight:700; }

/* ── Budget ── */
.btotal-n { font-size:44px; font-weight:800; letter-spacing:-0.03em; color:#fff; line-height:1; margin-bottom:16px; }
.budgetcat {
  background:var(--surf); border:1px solid var(--border); border-radius:16px;
  padding:16px 17px; margin-bottom:14px; transition:border-color 1s;
}
.budgetcat:last-child { margin-bottom:0; }
.budgetcat-ttl { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin-bottom:14px; }
.brow { display:flex; align-items:center; gap:10px; margin-bottom:9px; }
.brow:last-child { margin-bottom:0; }
.blbl { font-size:11px; color:var(--muted); width:26px; flex-shrink:0; }
.btrack { flex:1; height:18px; background:rgba(255,255,255,0.04); border-radius:5px; overflow:hidden; }
.bbar { height:100%; border-radius:5px; }
.bval { font-size:11px; color:rgba(255,255,255,0.75); flex-shrink:0; text-align:right; min-width:96px; font-variant-numeric:tabular-nums; }

/* ── Section label ── */
.sec-label {
  font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.08em;
  color:var(--muted); margin-bottom:10px;
}

@media (min-width: 640px) {
  .page { zoom: 1.2; }
}
.foot { text-align:center; font-size:11px; color:rgba(255,255,255,0.18); margin-top:44px; padding-top:22px; border-top:1px solid rgba(255,255,255,0.05); letter-spacing:.04em; line-height:1.8; }
</style>
</head>
<body>
<div id="amb"></div>
<div id="topfade"></div>
<div class="page">

<div class="stickyH">
  <div class="stickyH-inner">
    <div class="hRow">
      <div class="brand">
        <div class="brand-icon" id="bico">🏦</div>
        <div>
          <div class="brand-name">Bank ID</div>
          <div class="brand-sub">Еженедельный отчёт</div>
        </div>
      </div>
      <div class="wtag" id="wtag">Н— · —</div>
    </div>
    <div class="navRow">
      <div class="npill" id="np0" onclick="jumpTo(0)"><div class="npill-dot" style="background:var(--coral)"></div><span class="npill-lbl">Бюджет</span></div>
      <div class="npill" id="np1" onclick="jumpTo(1)"><div class="npill-dot" style="background:var(--blue)"></div><span class="npill-lbl">Вехи</span></div>
      <div class="npill" id="np2" onclick="jumpTo(2)"><div class="npill-dot" style="background:var(--green)"></div><span class="npill-lbl">Стримы</span></div>
    </div>
  </div>
</div>

<div class="sec" id="s0">
  <div class="eyebrow"><div class="eye-dot" id="ed0"></div><span id="ey0">Бюджет · Исполнение</span></div>
  <div class="sec-title" id="title0"><em id="em0">—</em> потрачено</div>
  <div id="content0"></div>
</div>

<div class="sec" id="s1">
  <div class="eyebrow"><div class="eye-dot" id="ed1"></div><span id="ey1">Вехи · Прогресс к целям</span></div>
  <div class="sec-title"><em id="em1">—</em> вехи</div>
  <div id="content1"></div>
</div>

<div class="sec" id="s2">
  <div class="eyebrow"><div class="eye-dot" id="ed2"></div><span id="ey2">Стримы проекта</span></div>
  <div class="sec-title"><em id="em2">—</em> стрима</div>
  <div id="content2"></div>
</div>

</div>

<script>
const SECS = [
  { acc:'#ff7a59', rgb:'255,122,89', icon:'💰',
    amb:'radial-gradient(ellipse 110% 65% at 50% -10%, rgba(255,122,89,.20) 0%, transparent 60%), radial-gradient(ellipse 60% 40% at 85% 90%, rgba(200,70,30,.09) 0%, transparent 50%), #07070a' },
  { acc:'#2db8f5', rgb:'45,184,245', icon:'🎯',
    amb:'radial-gradient(ellipse 110% 65% at 50% -10%, rgba(45,184,245,.22) 0%, transparent 60%), radial-gradient(ellipse 60% 40% at 85% 90%, rgba(0,120,200,.10) 0%, transparent 50%), #07070a' },
  { acc:'#0ae448', rgb:'10,228,72',  icon:'🧭',
    amb:'radial-gradient(ellipse 110% 65% at 30% 5%, rgba(10,228,72,.12) 0%, transparent 60%), radial-gradient(ellipse 60% 40% at 80% 80%, rgba(171,255,132,.06) 0%, transparent 50%), #07070a' },
];

const secEls = [0,1,2].map(i => document.getElementById('s'+i));
let cur = -1;

function apply(idx) {
  if (idx === cur) return;
  cur = idx;
  const s = SECS[idx];

  document.getElementById('amb').style.background = s.amb;

  const bi = document.getElementById('bico');
  bi.style.background = `rgba(${s.rgb},.14)`;
  bi.style.boxShadow = `0 0 12px rgba(${s.rgb},.15)`;

  const wt = document.getElementById('wtag');
  wt.style.borderColor = `rgba(${s.rgb},.32)`;
  wt.style.color = s.acc;

  for (let i = 0; i < 3; i++) {
    const np = document.getElementById('np'+i);
    const si = SECS[i];
    if (i === idx) {
      np.classList.add('on');
      np.style.background = si.acc;
      np.style.borderColor = 'transparent';
      np.querySelector('.npill-lbl').style.color = 'rgba(0,0,0,0.78)';
    } else {
      np.classList.remove('on');
      np.style.background = 'transparent';
      np.style.borderColor = 'rgba(255,255,255,0.07)';
      np.querySelector('.npill-lbl').style.color = 'rgba(240,237,232,0.38)';
    }
  }

  for (let i = 0; i < 3; i++) {
    const si = SECS[i];
    const ey = document.getElementById('ey'+i);
    const em = document.getElementById('em'+i);
    const ed = document.getElementById('ed'+i);
    if (ey) ey.style.color = i === idx ? si.acc : 'rgba(240,237,232,.25)';
    if (em) em.style.color = i === idx ? si.acc : '#fff';
    if (ed) {
      ed.style.background = si.acc;
      ed.style.opacity = i === idx ? '1' : '0.22';
      ed.style.boxShadow = i === idx ? `0 0 7px rgba(${si.rgb},.55)` : 'none';
    }
  }

  document.querySelectorAll('[data-s]').forEach(el => {
    const si = parseInt(el.dataset.s);
    const sei = SECS[si];
    if (si === idx) {
      el.style.borderColor = `rgba(${sei.rgb},.2)`;
      el.style.boxShadow = `0 0 14px rgba(${sei.rgb},.08)`;
    } else {
      el.style.borderColor = 'rgba(255,255,255,0.07)';
      el.style.boxShadow = 'none';
    }
  });

  document.querySelectorAll('.icard').forEach(el => {
    const si = parseInt(el.dataset.s || 0);
    if (si === idx) {
      el.style.borderColor = `rgba(${SECS[si].rgb},.2)`;
      el.style.boxShadow = `0 0 13px rgba(${SECS[si].rgb},.08)`;
    } else {
      el.style.borderColor = 'rgba(255,255,255,0.07)';
      el.style.boxShadow = 'none';
    }
  });
}

const io = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) apply(secEls.indexOf(e.target)); });
}, { rootMargin: '-35% 0px -60% 0px', threshold: 0 });
secEls.forEach(el => io.observe(el));

function onScroll() {
  const mid = window.innerHeight * 0.38;
  let active = 0;
  secEls.forEach((el, i) => { if (el.getBoundingClientRect().top <= mid) active = i; });
  apply(active);
}
window.addEventListener('scroll', onScroll, { passive: true });
function jumpTo(i) { secEls[i].scrollIntoView({ behavior:'smooth', block:'start' }); }

// WIP mode — only show updated items
const IS_NEW = window.location.hostname.includes('-new') || window.location.search.includes('new=1');

// Card focus glow
const CARD_SEL = '.icard, .stat2-card, .mcard';
let litCard = null;
function setLit(el, on) {
  if (!el) return;
  const sec = SECS[cur];
  if (on) { el.style.borderColor=`rgba(${sec.rgb},.45)`; el.style.boxShadow=`0 0 22px rgba(${sec.rgb},.14)`; el.style.transform='translateY(-1px)'; }
  else { el.style.borderColor=''; el.style.boxShadow=''; el.style.transform=''; }
}
const cardIo = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) { if (litCard && litCard !== e.target) setLit(litCard, false); litCard = e.target; setLit(litCard, true); }
    else if (litCard === e.target) { setLit(litCard, false); litCard = null; }
  });
}, { rootMargin: '-28% 0px -62% 0px', threshold: 0 });

// ── Render functions ──

function fmtList(items, color) {
  if (!items || items.length === 0) return '';
  return items.map((t,i) =>
    `<div style="display:flex;gap:8px;align-items:flex-start"><span style="color:${color};flex-shrink:0;margin-top:1px">${i+1}.</span><span>${t}</span></div>`
  ).join('');
}

function fmtArtifactList(items, color) {
  if (!items || items.length === 0) return '';
  return items.map(t =>
    `<div style="display:flex;gap:7px;align-items:flex-start"><span style="color:${color};flex-shrink:0">·</span><span>${t}</span></div>`
  ).join('');
}

function fmtNum(v) {
  let s = v.toFixed(2);
  if (s.endsWith('0')) s = s.slice(0, -1);
  if (s.endsWith('.')) s = s.slice(0, -1);
  return s.replace('.', ',');
}

const MONTHS = {'января':'Январь','февраля':'Февраль','марта':'Март','апреля':'Апрель','мая':'Май','июня':'Июнь','июля':'Июль','августа':'Август','сентября':'Сентябрь','октября':'Октябрь','ноября':'Ноябрь','декабря':'Декабрь'};
function fmtWeekTag(week, dateStr) {
  const [, mon, year] = dateStr.split(' ');
  return `Н${week} · ${MONTHS[mon] || mon} ${year}`;
}

function renderBudget(d) {
  const b = d.budget;
  document.getElementById('em0').textContent = `${fmtNum(b.spent_pct)}%`;

  const pct = b.total_pct > 0 ? Math.min(b.spent_pct / b.total_pct * 100, 100) : 0;

  const html = `
    <div class="sec-label">Исполнение бюджета</div>
    <div class="btotal-n">${fmtNum(b.spent_pct)}%</div>
    <div class="budgetcat" data-s="0">
      <div class="budgetcat-ttl">Прогресс</div>
      <div class="brow">
        <span class="blbl">%</span>
        <div class="btrack"><div class="bbar" style="width:${pct}%;background:var(--coral)"></div></div>
        <span class="bval">${fmtNum(b.spent_pct)} / ${fmtNum(b.total_pct)}</span>
      </div>
    </div>
    <div class="stat2" style="margin-top:14px">
      <div class="stat2-card" data-s="0" style="display:flex;align-items:center;justify-content:center;gap:14px">
        <div class="stat2-n" style="flex-shrink:0;font-size:36px;line-height:1;color:var(--coral)">${fmtNum(b.spent_pct)}%</div>
        <div style="font-size:13px;color:var(--muted);line-height:1.3">потрачено</div>
      </div>
      <div class="stat2-card" data-s="0" style="display:flex;align-items:center;justify-content:center;gap:14px">
        <div class="stat2-n" style="flex-shrink:0;font-size:36px;line-height:1">${fmtNum(b.remaining_pct)}%</div>
        <div style="font-size:13px;color:var(--muted);line-height:1.3">остаток</div>
      </div>
    </div>`;

  document.getElementById('content0').innerHTML = html;
}

function renderMilestones(d) {
  const items = d.milestones.items || [];
  document.getElementById('em1').textContent = `${items.length}`;

  let html = '';
  items.forEach(m => {
    const configured = m.target !== null && m.target !== undefined;
    if (!configured) {
      html += `
        <div class="mcard" data-s="1">
          <div class="mcard-ttl">${m.title}</div>
          <div class="mval" style="color:var(--muted)">Не настроена</div>
        </div>`;
      return;
    }
    const pct = m.target > 0 ? Math.min((m.current || 0) / m.target * 100, 100) : 0;
    html += `
      <div class="mcard" data-s="1">
        <div class="mcard-ttl">${m.title}</div>
        <div class="mtrack"><div class="mbar" style="width:${pct}%;background:var(--blue)"></div></div>
        <div class="mval"><b>${m.current ?? 0}</b> / ${m.target} ${m.unit || ''}</div>
      </div>`;
  });

  document.getElementById('content1').innerHTML = html;
}

const STREAM_ORDER = ['it', 'integrations', 'partners', 'org'];

function renderStreams(d) {
  const streams = d.streams || {};
  const keys = STREAM_ORDER.filter(k => streams[k]);
  document.getElementById('em2').textContent = `${keys.length}`;

  const streamsWithUpdates = keys.filter(k => (streams[k].done || []).length > 0);
  const visibleKeys = IS_NEW ? streamsWithUpdates : keys;

  let html = '';
  if (IS_NEW && visibleKeys.length === 0) {
    html = `<div style="text-align:center;color:var(--muted);padding:32px 0;font-size:14px">Пока нет обновлений за эту неделю</div>`;
  }
  visibleKeys.forEach(k => {
    const st = streams[k];
    const doneItems = fmtList(st.done, 'var(--green)');
    const artifactItems = fmtArtifactList(st.artifacts, 'var(--green)');
    html += `
      <div class="icard" data-s="2">
        <div class="icard-name">${st.title}</div>
        <div class="icard-divider"></div>
        ${doneItems ? `
        <div class="icard-row">
          <div class="icard-field">
            <div class="icard-label">Что сделано на неделе</div>
            <div class="icard-val"><div style="display:flex;flex-direction:column;gap:7px">${doneItems}</div></div>
          </div>
        </div>` : `<div class="icard-val" style="color:var(--muted)">Пока нет обновлений</div>`}
        ${artifactItems ? `
        <div class="icard-artifact">
          <div class="icard-label">Артефакты</div>
          <div class="icard-val" style="display:flex;flex-direction:column;gap:6px;margin-top:4px">${artifactItems}</div>
        </div>` : ''}
      </div>`;
  });

  document.getElementById('content2').innerHTML = html;
}

async function loadData() {
  const file = IS_NEW ? 'data-new.json' : 'data.json';
  const url = `https://raw.githubusercontent.com/sharnenkov/bank-id-weekly/main/${file}?t=${Date.now()}`;
  const res = await fetch(url);
  const d = await res.json();

  document.getElementById('wtag').textContent = fmtWeekTag(d.meta.week, d.meta.date);

  renderBudget(d);
  renderMilestones(d);
  renderStreams(d);

  document.getElementById('content2').insertAdjacentHTML('beforeend',
    `<div class="foot">Bank ID · Неделя ${d.meta.week} · ${d.meta.date}<br>Данные обновлены через Telegram-бот</div>`);

  document.querySelectorAll(CARD_SEL).forEach(el => {
    el.style.transition = 'border-color .35s, box-shadow .35s, transform .35s';
    cardIo.observe(el);
  });

  setTimeout(() => apply(0), 30);
  document.querySelector('.page').style.opacity = '1';
}

loadData();
</script>
</body>
</html>
